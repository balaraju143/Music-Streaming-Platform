<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>404 | MelodyX</title>

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Google Font -->

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"

    <link rel="stylesheet" href="css/404.css">

</head>

<body>

<!--=========================================
            BACKGROUND
==========================================-->

<div class="error-bg">

    <div class="blur blur1"></div>

    <div class="blur blur2"></div>

    <div class="blur blur3"></div>

</div>

<!--=========================================

==========================================-->

<div class="particles">

    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>

</div>

<!--=========================================
            MAIN CARD
==========================================-->

<section class="error-section">

    <div class="error-card">

        <!-- Top Icon -->

        <div class="error-icon">

            <i class="fa-solid fa-satellite-dish"></i>

        </div>

        <!-- 404 -->

        <h1>

            4<span>0</span>4

        </h1>

        <!-- Heading -->

        <h2>

            Oops! Page Not Found

        </h2>

        <!-- Description -->

        <p>

            The page you are looking for may have been removed,

            Let's guide you back to MelodyX.

        </p>

        <!--==========================
                FEATURES
        ===========================-->

        <div class="error-features">

            <div class="feature">

                <i class="fa-solid fa-crosshairs"></i>

                    Precision

                </span>

            </div>

            <div class="feature">

                <i class="fa-solid fa-shield-halved"></i>

                <span>

                    Security

                </span>

            </div>

            <div class="feature">

                <i class="fa-solid fa-wave-square"></i>

                <span>

                    Innovation

                </span>

            </div>

        </div>

        <!--==========================
                BUTTONS
        ===========================-->

        <div class="error-buttons">

            <a href="index.html"
               class="home-btn">

                <i class="fa-solid fa-house"></i>

                Back To Home

            </a>

            <a href="contact.html"
               class="contact-btn">

                Contact Us

            </a>

        </div>

    </div>

</section>

<!--=========================================
        FLOATING MUSIC ICONS
==========================================-->

<div class="floating-icons">

    <i class="fa-solid fa-music icon1"></i>

    <i class="fa-solid fa-headphones icon2"></i>

    <i class="fa-solid fa-compact-disc icon3"></i>

    <i class="fa-solid fa-microphone icon4"></i>

</div>

<script src="js/404.js"></script>
